name: Deploy via SSH rsync

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ssh-deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keygen -lf ~/.ssh/deploy_key

      - name: Add Server to known_hosts
        run: |
          ssh-keyscan -H -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Test SSH Connection
        run: |
          ssh \
            -i ~/.ssh/deploy_key \
            -p ${{ secrets.SSH_PORT }} \
            -o StrictHostKeyChecking=yes \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "echo '✅ SSH Connection Successful'; whoami; pwd"

      - name: Deploy Website
        run: |
          rsync -azv -- \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o IdentitiesOnly=yes" \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "logs" \
            --exclude "cache" \
            --exclude ".ftpquota" \
            --exclude "*.sql" \
            --exclude "*.sql.gz" \
            --exclude ".gitignore" \
            ./ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_REMOTE_PATH }}

      - name: Done
        run: echo "✅ Deployment completed successfully."