- name: Setup SSH
  env:
    SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  run: |
    mkdir -p ~/.ssh

    echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
    chmod 600 ~/.ssh/deploy_key

    echo "===== FIRST 5 LINES ====="
    head -5 ~/.ssh/deploy_key

    echo "===== LAST 5 LINES ====="
    tail -5 ~/.ssh/deploy_key

    echo "===== FILE TYPE ====="
    file ~/.ssh/deploy_key

    echo "===== KEY CHECK ====="
    ssh-keygen -lf ~/.ssh/deploy_key